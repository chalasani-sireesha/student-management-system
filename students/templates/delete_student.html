{% extends 'base.html' %}

{% block content %}

<h2>Delete Student</h2>

<p>Are you sure you want to delete <b>{{ student.name }}</b>?</p>

<form method="POST">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger"> Delete Student</button>
    <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
